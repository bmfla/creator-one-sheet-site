<style>
:root{
 --bg:#0a0b0a; --bg2:#0f120e; --panel:#14171380; --panel2:#181c16; --card:#131612;
 --line:#ffffff14; --line2:#ffffff22; --tx:#f4f6f0; --mut:#9aa294; --dim:#6b7364;
 --green:#c8f996; --greendk:#9fd06a; --pink:#e832d2; --blue:#7cc4ff;
 --red:#ff6b6b; --amber:#ffbf5e; --violet:#b79bff;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--tx);
 font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
 -webkit-font-smoothing:antialiased}
body{background:radial-gradient(1200px 600px at 80% -10%,#1a2416 0%,#0a0b0a 55%)}
a{color:inherit;text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:34px 22px 90px}
.mono{font-variant-numeric:tabular-nums}
.kick{color:var(--green);font-weight:700;letter-spacing:.22em;text-transform:uppercase;font-size:11px}
.ast{color:var(--green);display:inline-block}
h1{font-size:34px;line-height:1.05;letter-spacing:-.02em;margin:.28em 0 .1em;font-weight:700}
h1 .em{color:var(--pink);font-style:italic;font-weight:600}
.sub{color:var(--mut);font-size:14px;max-width:680px}
/* index */
.topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;
 border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:8px}
.legend{display:flex;gap:26px;flex-wrap:wrap;margin:22px 0 6px}
.leg{display:flex;flex-direction:column}
.leg b{font-size:22px}.leg span{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;margin-top:22px}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;cursor:pointer;
 transition:border-color .2s,transform .2s,background .2s;position:relative;overflow:hidden}
.ccard:hover{border-color:var(--green);transform:translateY(-3px);background:#161a13}
.ccard .row1{display:flex;gap:14px;align-items:center}
.av{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--line2);flex-shrink:0;background:#222}
.av.big{width:104px;height:104px;border:3px solid var(--green)}
.avwrap{position:relative;flex-shrink:0}
.igb{position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:6px;
 background:linear-gradient(45deg,#feda75,#d62976,#962fbf);display:grid;place-items:center;border:2px solid var(--bg)}
.igb svg{width:12px;height:12px;color:#fff}
.nm{font-weight:700;font-size:16px;display:flex;align-items:center;gap:6px;line-height:1.15}
.vf{color:var(--blue);flex-shrink:0}
.hl{color:var(--green);font-size:13px}
.niche{color:var(--mut);font-size:12px;margin-top:3px}
.ccard .row2{display:flex;gap:18px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.kv{display:flex;flex-direction:column}
.kv b{font-size:16px}.kv span{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.tier{padding:2px 9px;border-radius:20px;font-size:11px;text-transform:capitalize;align-self:flex-start;font-weight:600}
.t-micro{background:#123047;color:#7cc4ff}.t-mid{background:#2c2350;color:var(--violet)}
.t-macro{background:#3a2016;color:#ffbf5e}.t-nano{background:#12331f;color:#86efac}
.pillrow{display:flex;margin:0 0 14px}
.pill{font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;border-radius:20px;padding:4px 11px;border:1px solid var(--line)}
.pill-e{color:var(--green);background:#12331f}
.pill-p{color:var(--amber);background:#2a220e}
.rate{margin-left:auto;text-align:right}
.rate b{color:var(--green);font-size:17px}.rate span{display:block;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
/* detail */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--mut);font-size:13px;margin-bottom:20px;cursor:pointer;
 border:1px solid var(--line);border-radius:20px;padding:7px 15px;background:var(--panel)}
.back:hover{border-color:var(--green);color:var(--tx)}
.cover{text-align:center;padding:14px 0 8px}
.cover .nm{justify-content:center;font-size:26px}
.cover .hl{font-size:15px;margin-top:2px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:26px 0}
@media(max-width:760px){.statgrid{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
.sc .big{font-size:23px;font-weight:700;display:flex;align-items:baseline;gap:8px}
.sc .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-top:6px}
.sc .delta{font-size:12px}.up{color:var(--green)}.down{color:var(--red)}
.sec{margin:30px 0}
.sec>h3{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);margin:0 0 14px;font-weight:700}
.sec>h3 .em{color:var(--tx)}
.panels{display:grid;gap:16px}
.p2{grid-template-columns:1fr 1fr}.p3{grid-template-columns:1.1fr 1.5fr 1fr}
@media(max-width:820px){.p2,.p3{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
.panel h4{margin:0 0 14px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-weight:600}
.bio{color:#cdd4c6;font-size:14px;line-height:1.55}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:#1c211a;border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:12.5px;color:#d6dccf}
.chip.g{border-color:#c8f99640;color:var(--green)}
.muted{color:var(--mut)}
/* donut + credibility */
.donutwrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.legrows{flex:1;min-width:150px}
.lrow{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:13px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lrow .lv{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.cred{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.crednum{font-size:30px;font-weight:800}
.credcls{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
/* bars */
.bar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px}
.bar .bl{width:66px;color:var(--mut);flex-shrink:0}
.bar .bt{flex:1;height:9px;background:#0c0f0a;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.bar .bf{display:block;height:100%;border-radius:6px}
.bar .bv{width:52px;text-align:right;font-variant-numeric:tabular-nums;color:#d6dccf}
.agerow{display:flex;align-items:flex-end;gap:10px;margin:9px 0}
.ages{display:flex;justify-content:space-between;align-items:flex-end;height:130px;gap:8px;padding-top:10px}
.agecol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.agebar{width:60%;max-width:26px;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--green),var(--greendk))}
.agev{font-size:11px;color:#d6dccf;margin-bottom:5px;font-variant-numeric:tabular-nums}
.agelbl{font-size:10.5px;color:var(--mut);margin-top:7px}
/* geo */
.geo{list-style:none;padding:0;margin:0}
.geo li{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.geo li:last-child{border-bottom:0}
.geo img{width:26px;height:19px;border-radius:3px;object-fit:cover;flex-shrink:0;box-shadow:0 0 0 1px #ffffff18}
.geo .gt{flex:1}
.geo .gbar{width:90px;height:6px;background:#0c0f0a;border-radius:6px;overflow:hidden}
.geo .gbf{display:block;height:100%;background:var(--green)}
.geo .gp{width:52px;text-align:right;font-variant-numeric:tabular-nums;color:#d6dccf}
.cities{margin-top:12px}
.cityrow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:#cdd4c6;border-bottom:1px solid #ffffff0d}
.pricebox{background:linear-gradient(180deg,#141a10,#0f120d);border:1px solid #c8f99630;border-radius:16px;padding:20px 22px}
.prange{display:flex;align-items:baseline;gap:22px;margin-top:6px}
.prange .med{font-size:34px;font-weight:800;color:var(--green)}
.prange .med small{display:block;font-size:11px;color:var(--mut);font-weight:500;letter-spacing:.04em}
.prange .lo,.prange .hi{font-size:19px;color:var(--mut)}
.scaleline{height:5px;border-radius:6px;background:linear-gradient(90deg,#2a3320,#c8f996);margin:14px 0 4px;max-width:360px}
.scalelbls{display:flex;justify-content:space-between;max-width:360px;color:var(--dim);font-size:11px}
.notice{background:#211c0c;border:1px solid #5c4a1c;color:var(--amber);border-radius:12px;padding:13px 15px;font-size:13px}
.footer{color:var(--dim);font-size:11.5px;border-top:1px solid var(--line);padding-top:18px;margin-top:36px;line-height:1.6}
.hidden{display:none!important}

<script>
const D = window.__DATA__;
const flags = D.flags;
const byHandle = {}; D.creators.forEach(c=>byHandle[c.handle]=c);
const fmt = n => { n=+n; if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'K'; return ''+n; };
const pc = x => (x==null)?'—':(x*100).toFixed(1)+'%';
const esc = s => (s==null?'':(''+s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const IGB = '<span class="igb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/></svg></span>';
const VF = '<svg class="vf" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 1.8 3-.3 1 2.8 2.6 1.5-.8 2.9.8 2.9-2.6 1.5-1 2.8-3-.3L12 22l-2.4-1.8-3 .3-1-2.8L3 16.2l.8-2.9L3 10.4l2.6-1.5 1-2.8 3 .3z"/><path d="M10.5 14.6l-2-2 1.1-1.1.9.9 3-3 1.1 1.1z" fill="#0a0b0a"/></svg>';
const TYPES=[['real','Real people','#c8f996'],['influencers','Influencers','#b79bff'],['mass_followers','Mass followers','#e832d2'],['suspicious','Suspicious / fake','#ff6b6b']];
const AGES=['13-17','18-24','25-34','35-44','45-64','65-'];

function avatarEl(c,cls){ const s=c.avatar||''; 
 return `<div class="avwrap"><img class="av ${cls||''}" src="${s}" alt="">${IGB}</div>`; }

function credColor(v){ return v>=.85?'#c8f996':(v>=.75?'#ffbf5e':'#ff6b6b'); }

function donut(types){
 const segs=TYPES.map(([k,,col])=>({v:types[k]||0,col})).filter(s=>s.v>0);
 const R=52,C=2*Math.PI*R; let off=0;
 const rings=segs.map(s=>{const len=s.v*C;const el=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${s.col}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;off+=len;return el;}).join('');
 return `<svg width="140" height="140" viewBox="0 0 140 140">${rings}<circle r="44" cx="70" cy="70" fill="#0f120d"/></svg>`;
}

function renderCard(c){
 const a=c.audience;
 const pill = a? `<span class="pill pill-e">Creatorland Enrichment</span>`:`<span class="pill pill-p">Profile only</span>`;
 return `<div class="ccard" data-h="${c.handle}">
   <div class="pillrow">${pill}</div>
   <div class="row1">
     ${avatarEl(c,'')}
     <div>
       <div class="nm">${esc(c.name)} ${c.verified?VF:''}</div>
       <div class="hl">@${esc(c.handle)}</div>
       <div class="niche">${esc(c.niche||'')}${c.country?' · '+esc(c.country):''}</div>
     </div>
   </div>
   <div class="row2">
     <div class="kv"><b class="mono">${fmt(c.followers)}</b><span>Followers</span></div>
     <div class="kv"><b class="mono">${pc(c.er)}</b><span>Eng. rate</span></div>
     <div class="kv"><span class="tier t-${c.tier}">${c.tier}</span></div>
     <div class="rate"><b class="mono">$${c.rate_med}</b><span>Rec. median</span></div>
   </div>
   </div>`;
}

function renderIndex(){
 const totReach=D.creators.reduce((s,c)=>s+ +c.followers,0);
 const withAud=D.creators.filter(c=>c.audience).length;
 document.getElementById('app').innerHTML = `
  <div class="topbar">
   <div>
     <div class="kick"><span class="ast">✳</span> Creatorland · Data MCP</div>
     <h1>Creator <span class="em">intelligence</span><br>Intro-brokered prospects</h1>
     <div class="sub">${D.creators.length} creators with brokered intros — enriched via the Creatorland Data MCP with verified audience data and rate benchmarks from the Technology deal corpus. Tap any creator for the full audience report.</div>
   </div>
  </div>
  <div class="legend">
   <div class="leg"><b class="mono">${D.creators.length}</b><span>Creators</span></div>
   <div class="leg"><b class="mono">${withAud}</b><span>Full audience reports</span></div>
   <div class="leg"><b class="mono">${fmt(totReach)}</b><span>Combined reach</span></div>
   <div class="leg"><b class="mono">$50–$500</b><span>Rec. rate span</span></div>
  </div>
  <div class="grid">${D.creators.map(renderCard).join('')}</div>
  <div class="footer">${FOOT}</div>`;
}

function bar(label,val,col){ const w=Math.max(0,Math.min(100,(val||0)*100));
 return `<div class="bar"><span class="bl">${esc(label)}</span><span class="bt"><span class="bf" style="width:${w.toFixed(1)}%;background:${col}"></span></span><span class="bv">${pc(val)}</span></div>`; }

function chips(arr,green){ if(!arr||!arr.length) return '<span class="muted">—</span>';
 return `<div class="chips">${arr.map(x=>{const n=x.name||x;const w=(x.weight!=null)?' · '+pc(x.weight):'';return `<span class="chip ${green?'g':''}">${esc(n)}${w}</span>`;}).join('')}</div>`; }

function renderAudience(c){
 const a=c.audience;
 if(!a){ const tc=(c.aud_top&&c.aud_top[0])||null;
  return `<div class="sec"><h3>Audience <span class="em">details</span></h3>
   <div class="notice">Full third-party audience report pending — the vendor pull for this large account exceeded the request timeout. Re-runnable on request. Profile-level signal shown below.</div>
   <div class="panels p2" style="margin-top:16px">
     <div class="panel"><h4>Top audience country</h4><div style="font-size:22px;font-weight:700">${tc?esc(tc[0]):'—'} <span class="muted mono" style="font-size:15px">${tc?pc(tc[1]):''}</span></div></div>
     <div class="panel"><h4>Creator interests</h4>${chips(c.interests,true)}</div>
   </div></div>`; }
 const types=a.types||{};
 const cred=a.credibility, cc=credColor(cred||0);
 const g=a.genders||{};
 const ages=a.ages||{};
 const maxAge=Math.max(...AGES.map(k=>ages[k]||0),0.001);
 const countries=(a.countries||[]).slice(0,5);
 const maxC=Math.max(...countries.map(x=>x.weight||0),0.001);
 const cities=(a.cities||[]).slice(0,5);
 const langs=(a.languages||[]).slice(0,3);
 return `<div class="sec"><h3>Audience <span class="em">details</span> <span class="muted" style="text-transform:none;letter-spacing:0;font-weight:500">— verified third-party data, as of ${esc((a.as_of||'').slice(0,10))}</span></h3>
  <div class="panels p3">
    <div class="panel"><h4>Audience quality</h4>
      <div class="donutwrap">
        <div style="position:relative">${donut(types)}
          <div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center">
            <div><div class="crednum" style="color:${cc}">${pc(cred)}</div><div class="credcls">${esc(a.credibility_class||'cred.')}</div></div>
          </div>
        </div>
        <div class="legrows">${TYPES.map(([k,lab,col])=>`<div class="lrow"><span class="dot" style="background:${col}"></span>${lab}<span class="lv mono">${pc(types[k])}</span></div>`).join('')}</div>
      </div>
    </div>
    <div class="panel"><h4>Age & gender split</h4>
      ${bar('Female',g.female,'#e832d2')}${bar('Male',g.male,'#7cc4ff')}
      <div class="ages">${AGES.map(k=>{const v=ages[k]||0;const h=(v/maxAge)*100;return `<div class="agecol"><span class="agev mono">${v?pc(v):''}</span><span class="agebar" style="height:${h.toFixed(0)}%"></span><span class="agelbl">${k==='65-'?'65+':k}</span></div>`;}).join('')}</div>
    </div>
    <div class="panel"><h4>Location by country</h4>
      <ul class="geo">${countries.map(x=>`<li>${x.code&&flags[x.code]?`<img src="${flags[x.code]}">`:'<span style="width:26px"></span>'}<span class="gt">${esc(x.name)}</span><span class="gbar"><span class="gbf" style="width:${((x.weight/maxC)*100).toFixed(0)}%"></span></span><span class="gp mono">${pc(x.weight)}</span></li>`).join('')||'<li class="muted">—</li>'}</ul>
      ${cities.length?`<div class="cities"><h4 style="margin:14px 0 6px">Top cities</h4>${cities.map(x=>`<div class="cityrow"><span>${esc(x.name)}</span><span class="mono muted">${pc(x.weight)}</span></div>`).join('')}</div>`:''}
    </div>
  </div>
  <div class="panels p3" style="margin-top:16px">
    <div class="panel"><h4>Audience interests</h4>${chips((a.interests||[]).slice(0,6))}</div>
    <div class="panel"><h4>Audience brand affinity</h4>${chips((a.brand_affinity||[]).slice(0,8))}</div>
    <div class="panel"><h4>Languages</h4>${langs.length?langs.map(l=>bar(l.name,l.weight,'#9fd06a')).join(''):'<span class="muted">—</span>'}</div>
  </div>
 </div>`;
}

function renderDetail(c){
 const loc=[c.city,c.country].filter(Boolean).join(', ')||'—';
 return `<div class="back" data-back="1"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg> All creators</div>
  <div class="cover">
    ${avatarEl(c,'big')}
    <div class="nm" style="margin-top:14px">${esc(c.name)} ${c.verified?VF:''}</div>

  <div class="statgrid">
    <div class="sc"><div class="big mono">${fmt(c.followers)}</div><div class="lbl">Followers · <span class="tier t-${c.tier}" style="padding:1px 8px">${c.tier}</span></div></div>
    <div class="sc"><div class="big mono">${pc(c.er)}</div><div class="lbl">Engagement rate</div></div>
    <div class="sc"><div class="big" style="font-size:18px">${esc(loc)}</div><div class="lbl">Creator location</div></div>
    <div class="sc"><div class="big mono" style="color:var(--green)">$${c.rate_med}</div><div class="lbl">Recommended median</div></div>
  </div>

  <div class="sec"><h3>Creator <span class="em">profile</span></h3>
   <div class="panels p2">
     <div class="panel"><h4>Bio</h4><div class="bio">${esc(c.bio)}</div>
       <div style="margin-top:14px"><h4>Outreach status</h4><div class="chips"><span class="chip g">intro brokered</span>${c.reply?`<span class="chip">reply: ${esc(c.reply)}</span>`:''}${c.email?`<span class="chip">${esc(c.email)}</span>`:''}</div></div>

     <div class="panel"><h4>Creator interests</h4>${chips(c.interests)}

     <div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em">Technology vertical · per sponsored post · ${esc(c.tier)} tier</div>
     <div class="prange"><span class="lo mono">$${c.rate_low}</span><span class="med mono">$${c.rate_med}<small>MEDIAN</small></span><span class="hi mono">$${c.rate_high}</span></div>
     <div class="scaleline"></div>
     <div class="scalelbls"><span>p25 · $${c.rate_low}</span><span>median</span><span>p75 · $${c.rate_high}</span></div>
     <div class="muted" style="font-size:12px;margin-top:12px">Benchmark band across creators in this tier (Creatorland deal corpus, as of 2026-07-06) — a negotiation anchor, not a per-creator quote.</div>
   </div>
  </div>
  <div class="footer">${FOOT}</div>`;
}

const FOOT = 'Recommended rates are p25 / median / p75 of valued deals in the Creatorland Technology vertical by creator tier (as of 2026-07-06): micro (10k–100k) $50 / $110 / $300 · mid (100k–500k) $50 / $150 / $500. Audience demographics are verified third-party data served via the Creatorland Data MCP; credibility & fake-follower metrics are Instagram-first. Avatars & profile facts from the MCP profile read. shedoesai and uxgoodies show profile-level audience only (full vendor report exceeded the request timeout).';

let __cur=null;
function go(h){ __cur=(h && byHandle[h])?h:null; render(); window.scrollTo(0,0); }
function render(){
 if(__cur && byHandle[__cur]) document.getElementById('app').innerHTML = renderDetail(byHandle[__cur]);
 else renderIndex();
}
document.addEventListener('click',function(e){
 const card=e.target.closest && e.target.closest('.ccard');
 if(card && card.getAttribute('data-h')){ go(card.getAttribute('data-h')); return; }

});
render();
